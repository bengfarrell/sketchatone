name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-nodejs:
    name: Node.js Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build:cli
    
    - name: Setup Virtual MIDI (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo modprobe snd-virmidi
        # Verify module loaded
        lsmod | grep snd_virmidi
        # List MIDI ports
        aplaymidi -l || true
    
    - name: Setup Virtual MIDI (macOS)
      if: runner.os == 'macOS'
      run: |
        # IAC Driver should be available by default on macOS
        # Just verify we can detect it
        echo "IAC Driver should be available on macOS"
    
    - name: Run unit tests
      run: npm test -- test/unit/
    
    - name: Run virtual MIDI integration tests
      run: npm test -- test/integration/virtual-midi.test.ts
      # Continue on error for now since macOS IAC might not be enabled in CI
      continue-on-error: true

  test-python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'python/pyproject.toml'
    
    - name: Install dependencies
      run: |
        cd python
        pip install -e ".[dev]"
    
    - name: Setup Virtual MIDI (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo modprobe snd-virmidi
        lsmod | grep snd_virmidi
        aplaymidi -l || true
    
    - name: Run unit tests
      run: |
        cd python
        pytest tests/unit/ -v
    
    - name: Run integration tests (config loading)
      run: |
        cd python
        pytest tests/integration/test_config_loading.py -v

    - name: Run virtual MIDI integration tests
      run: |
        cd python
        pytest tests/integration/test_virtual_midi.py -v
      continue-on-error: true

  test-coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'python/pyproject.toml'
    
    - name: Install dependencies
      run: |
        npm ci
        cd python && pip install -e ".[dev]"
    
    - name: Setup Virtual MIDI
      run: |
        sudo modprobe snd-virmidi
        lsmod | grep snd_virmidi
    
    - name: Run all tests with coverage
      run: |
        npm run build:cli
        npm test -- --coverage || true
        cd python && pytest --cov=sketchatone --cov-report=term || true
    
    - name: Test Summary
      run: |
        echo "✅ Test suite completed"
        echo "See individual job results for details"
